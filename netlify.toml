[build]
  publish = "public"
    functions = "netlify/functions"
      command = "npm install"
      [functions]
        node_bundler = "esbuild"
        [[redirects]]
          from = "/success"
            to = "/index.html"
              status = 200
              [[redirects]]
                from = "/*"
                  to = "/index.html"
                    status = 200
